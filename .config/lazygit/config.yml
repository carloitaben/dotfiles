git:
  pagers:
    - pager: delta --paging=never --hunk-header-style=omit --file-style=omit --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
      colorArg: never

gui:
  border: single
  scrollHeight: 5
  showFileIcons: false
  showFileTree: false
  tabWidth: 2
  spinner:
    frames:
      - "⠋"
      - "⠙"
      - "⠹"
      - "⠸"
      - "⠼"
      - "⠴"
      - "⠦"
      - "⠧"
      - "⠇"
      - "⠏"

quitOnTopLevelReturn: true

# Some of these requiore `gh repo set-default` to work with forks
customCommands:
  # Create worktree from current branch (when in worktrees view)
  # From https://www.jamescrosswell.dev/posts/switching-to-git-worktrees/
  - key: "N"
    context: "worktrees"
    description: "Create new worktree from current branch"
    prompts:
      - type: "input"
        title: "Create a new worktree from {{ .CheckedOutBranch.Name }} with what name?"
        key: "Name"
        initialValue: ""
    command: "git worktree add ../{{ .Form.Name }} {{ .CheckedOutBranch.Name }} -b {{ .Form.Name }}"

  # Create worktree from selected branch (when in branches view)
  # From https://www.jamescrosswell.dev/posts/switching-to-git-worktrees/
  - key: "N"
    context: "localBranches"
    description: "Create new worktree from selected branch"
    prompts:
      - type: "input"
        title: "Create a new worktree from {{ .SelectedLocalBranch.Name }} with what name?"
        key: "Name"
        initialValue: ""
    command: "git worktree add ../{{ .Form.Name }} {{ .SelectedLocalBranch.Name }} -b {{ .Form.Name }}"

  - key: "t"
    context: "localBranches"
    description: "Trim local branches whose remotes are gone from upstream"
    command: >
      git fetch --prune &&
      git for-each-ref --format '%(refname:short) %(upstream:track)' refs/heads |
      grep '\[gone\]' |
      cut -d' ' -f1 |
      xargs -r git branch -D

  - key: "v"
    context: "localBranches"
    command: "gh pr checkout {{.Form.PullRequestNumber}}"
    description: "Select GitHub PR for Checkout"
    loadingText: "Checking out GitHub Pull Request..."
    prompts:
      - type: "menuFromCommand"
        title: "Which PR do you want to check out?"
        key: "PullRequestNumber"
        command: |-
          gh pr list --json number,title,headRefName --template '{{`{{range .}}{{printf "#%v: %s - %s" .number .title .headRefName}}
          {{end}}`}}'
        filter: "#(?P<number>[0-9]+): (?P<title>.+) - (?P<ref_name>[^ ]+)"
        valueFormat: "{{.number}}"
        labelFormat: '{{"#" | black | bold}}{{.number | white | bold}} {{.title | yellow | bold}}{{" [" | black | bold}}{{.ref_name | green}}{{"]" | black | bold}}'

  - key: "G"
    command: "gh pr view -w {{.SelectedLocalBranch.Name}}"
    context: "localBranches"
    description: "Open Github PR in browser"

  - key: "G"
    command: "gh pr view -w"
    context: "commits"
    description: "Open Github PR in browser"

  - key: "x"
    command: "gh repo view --web --branch {{.SelectedLocalBranch.Name}}"
    context: "localBranches"
    description: "Open branch in browser"

  - key: "x"
    command: "gh repo view --web --branch {{.SelectedRemoteBranch.Name}}"
    context: "remoteBranches"
    description: "Open branch in browser"
